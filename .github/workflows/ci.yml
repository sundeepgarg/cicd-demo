name: CI/CD Pipeline

# ─────────────────────────────────────────────────────────────
#  Triggers
#  - Every push to any branch  → runs test + build jobs
#  - Every PR targeting main   → runs test + build jobs
#  - Push to main              → runs all 3 jobs (including deploy)
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: cicd-demo
  REGISTRY: ghcr.io

jobs:

# ══════════════════════════════════════════════════════════════
#  JOB 1 — TEST
#  Run unit tests before wasting time on Docker build
# ══════════════════════════════════════════════════════════════
  test:
    name: "1 · Unit Tests"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run pytest
        run: pytest app/ -v

# ══════════════════════════════════════════════════════════════
#  JOB 2 — BUILD & PUSH
#  Build Docker image, push to GitHub Container Registry (GHCR)
#  GHCR is free — uses GITHUB_TOKEN, no extra secrets needed
# ══════════════════════════════════════════════════════════════
  build:
    name: "2 · Build & Push to GHCR"
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write        # allows pushing to GHCR

    outputs:
      image-tag: ${{ steps.tag.outputs.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag (short SHA)
        id: tag
        run: echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # auto-provided, no setup needed

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:sha-${{ steps.tag.outputs.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

# ══════════════════════════════════════════════════════════════
#  JOB 3 — DEPLOY TO AZURE CONTAINER APPS
#
#  No AKS, no ACR, no Terraform needed.
#  Azure Container Apps is a managed serverless container platform.
#  It pulls the image from GHCR and runs it with a public HTTPS URL.
#
#  Secrets needed (only 1):
#    AZURE_CREDENTIALS  — service principal JSON from az ad sp create-for-rbac
#
#  One-time infra setup (run from laptop — see SETUP.md):
#    az group create ...
#    az containerapp env create ...
#    az containerapp create ...   ← only needed once; this job uses 'update'
# ══════════════════════════════════════════════════════════════
  deploy:
    name: "3 · Deploy to Azure Container Apps"
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'   # only deploy from main, not feature branches

    environment:
      name: production
      url: ${{ steps.get-url.outputs.app_url }}

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Container Apps CLI extension — not installed by default on runners
      - name: Install Container Apps CLI extension
        run: az extension add --name containerapp --upgrade --yes

      # Rolling update: Container Apps starts new container with new image,
      # waits for it to pass health checks, then routes traffic to it.
      # Old container stays alive until new one is healthy — zero downtime.
      - name: Deploy new image to Container Apps
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ github.repository }}:sha-${{ needs.build.outputs.image-tag }}"
          echo "Deploying image: ${IMAGE}"
          az containerapp update \
            --name cicd-demo \
            --resource-group rg-cicd-demo \
            --image "${IMAGE}"

      # Get the public HTTPS URL assigned by Azure (stays the same across deploys)
      - name: Get app URL
        id: get-url
        run: |
          URL=$(az containerapp show \
            --name cicd-demo \
            --resource-group rg-cicd-demo \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)
          echo "app_url=https://${URL}" >> $GITHUB_OUTPUT
          echo "APP_URL=https://${URL}" >> $GITHUB_ENV
          echo "Live at: https://${URL}"

      # Give the new container a few seconds to start, then hit the endpoint
      - name: Smoke test — verify live app is healthy
        run: |
          sleep 15
          echo "Testing: ${{ env.APP_URL }}"
          curl --fail --retry 3 --retry-delay 5 ${{ env.APP_URL }}/
          curl --fail --retry 3 --retry-delay 5 ${{ env.APP_URL }}/health

      - name: Show logs on failure
        if: failure()
        run: |
          az containerapp logs show \
            --name cicd-demo \
            --resource-group rg-cicd-demo \
            --tail 50
