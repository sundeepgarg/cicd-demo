name: CI/CD Pipeline

# ─────────────────────────────────────────────────────────────
#  Triggers
#  - Every push to any branch  → runs test + build jobs
#  - Every PR targeting main   → runs test + build jobs
#  - Push to main              → runs all 3 jobs (including deploy)
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: cicd-demo

jobs:

# ══════════════════════════════════════════════════════════════
#  JOB 1 — TEST
#  Run unit tests before wasting time on Docker build
# ══════════════════════════════════════════════════════════════
  test:
    name: "1 · Unit Tests"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run pytest
        run: pytest app/ -v

# ══════════════════════════════════════════════════════════════
#  JOB 2 — BUILD & PUSH
#  Build Docker image, push to Azure Container Registry (ACR)
#  Only runs if test job passed
# ══════════════════════════════════════════════════════════════
  build:
    name: "2 · Build & Push to ACR"
    runs-on: ubuntu-latest
    needs: test                       # waits for test job to succeed

    outputs:
      image-tag: ${{ steps.tag.outputs.sha }}   # pass tag to deploy job

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Short git SHA used as the image tag — uniquely identifies this build
      - name: Set image tag (short SHA)
        id: tag
        run: echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      # Log in to ACR using admin credentials stored as GitHub secrets
      # ACR_LOGIN_SERVER = cicddemoacr<suffix>.azurecr.io
      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # Build the image and push two tags:
      #   :sha-abc1234  — immutable, identifies this exact commit
      #   :latest       — always points to newest main build
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:sha-${{ steps.tag.outputs.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha        # reuses Docker layer cache from previous runs
          cache-to: type=gha,mode=max

# ══════════════════════════════════════════════════════════════
#  JOB 3 — DEPLOY TO AKS
#  Rolling update — replaces pods with new image one by one
#  Only runs on main branch, only if build job succeeded
# ══════════════════════════════════════════════════════════════
  deploy:
    name: "3 · Deploy to AKS"
    runs-on: ubuntu-latest
    needs: build                      # waits for build job to succeed
    if: github.ref == 'refs/heads/main'   # skip on feature branches and PRs

    environment:
      name: production                # creates an Environment in GitHub for audit trail
      url: ${{ steps.get-url.outputs.app_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Log in to Azure using service principal credentials
      # AZURE_CREDENTIALS = JSON output from: az ad sp create-for-rbac ...
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Downloads kubeconfig from AKS — after this step kubectl works
      - name: Get AKS credentials (configure kubectl)
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      # Replace IMAGE_PLACEHOLDER in deployment.yaml with the actual ACR image URI
      # e.g.  cicddemoacr123.azurecr.io/cicd-demo:sha-abc1234
      - name: Substitute image in deployment manifest
        run: |
          IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:sha-${{ needs.build.outputs.image-tag }}"
          echo "Deploying: ${IMAGE}"
          sed -i "s|IMAGE_PLACEHOLDER|${IMAGE}|g" k8s/deployment.yaml

      # Apply manifests — kubectl does a diff and only updates what changed
      # First deploy: creates Deployment + Service
      # Later deploys: updates Deployment image → rolling update starts
      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      # Wait for the rolling update to finish — fails job if pods crash
      # Rolling update replaces pods one by one, old pods stay up until new ones are Ready
      - name: Wait for rollout to complete
        run: kubectl rollout status deployment/cicd-demo --timeout=120s

      # Show current pod state so you can see both replicas Running
      - name: Show pod status
        run: |
          kubectl get pods -o wide
          kubectl get service cicd-demo

      # Azure LoadBalancer takes ~60 seconds to assign a public IP on first deploy
      # Poll until IP appears, then store it as APP_URL for the smoke test
      - name: Wait for LoadBalancer IP
        id: get-url
        run: |
          echo "Waiting for LoadBalancer external IP..."
          for i in $(seq 1 20); do
            IP=$(kubectl get svc cicd-demo -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
            if [ -n "$IP" ]; then
              echo "Got IP: ${IP}"
              echo "app_url=http://${IP}" >> $GITHUB_OUTPUT
              echo "APP_URL=http://${IP}" >> $GITHUB_ENV
              break
            fi
            echo "  attempt ${i}/20 — waiting 15s..."
            sleep 15
          done

      # Hit the live app and verify it responds — proves the deploy actually worked
      - name: Smoke test — call the live app
        run: |
          echo "Testing: ${{ env.APP_URL }}"
          curl -f ${{ env.APP_URL }}/
          curl -f ${{ env.APP_URL }}/health

      # If anything above failed, print logs to help debug
      - name: Show pod logs on failure
        if: failure()
        run: |
          kubectl describe pods -l app=cicd-demo
          kubectl logs -l app=cicd-demo --tail=50
